<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book List - BookManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .card-header {
            border-radius: 12px 12px 0 0 !important;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            color: white; font-weight: 600;
        }
        .table th { background-color: #f1f5f9; font-weight: 600; color: #475569; }
        .table tbody tr:hover { background-color: #f8fafc; }
        .badge-category { background: #e0f2fe; color: #0369a1; }
        .btn-add { background: linear-gradient(135deg, #1e40af, #3b82f6); border: none; color: white; }
        .btn-add:hover { background: linear-gradient(135deg, #1e3a8a, #2563eb); color: white; }
        .price-cell { font-weight: 600; color: #0d9488; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark mb-4"
     style="background: linear-gradient(135deg, #0f172a, #1e3a8a);">
    <div class="container">
        <a class="navbar-brand" href="/books">
            <i class="bi bi-book-half me-2"></i>BookManager
        </a>
        <span class="navbar-text text-light small">Spring Boot + Thymeleaf + MySQL</span>
    </div>
</nav>

<div class="container">

    <!-- Flash Messages -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center py-3">
            <h5 class="mb-0">
                <i class="bi bi-journal-text me-2"></i>Book List
            </h5>
            <a href="/books/add" class="btn btn-add btn-sm px-3">
                <i class="bi bi-plus-circle me-1"></i> Add New Book
            </a>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead>
                    <tr>
                        <th class="ps-4" style="width: 60px;">#</th>
                        <th>Title</th>
                        <th>Author</th>
                        <th>Category</th>
                        <th>Price (VND)</th>
                        <th class="text-center" style="width: 140px;">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(books)}">
                        <td colspan="6" class="text-center py-5 text-muted">
                            <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                            No books found. <a href="/books/add">Add your first book!</a>
                        </td>
                    </tr>
                    <tr th:each="book, stat : ${books}">
                        <td class="ps-4 text-muted" th:text="${stat.index + 1}">1</td>
                        <td>
                            <strong th:text="${book.title}">Book Title</strong>
                        </td>
                        <td th:text="${book.author}">Author Name</td>
                        <td>
                            <span class="badge badge-category px-2 py-1 rounded-pill"
                                  th:text="${book.category.name}">Category</span>
                        </td>
                        <td class="price-cell"
                            th:text="${#numbers.formatDecimal(book.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                            0 ₫
                        </td>
                        <td class="text-center">
                            <a th:href="@{/books/edit/{id}(id=${book.id})}"
                               class="btn btn-warning btn-sm me-1" title="Edit">
                                <i class="bi bi-pencil-fill"></i>
                            </a>
                            <a th:href="@{/books/delete/{id}(id=${book.id})}"
                               class="btn btn-danger btn-sm"
                               title="Delete"
                               onclick="return confirm('Are you sure you want to delete this book?')">
                                <i class="bi bi-trash-fill"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer text-muted small" th:if="${!#lists.isEmpty(books)}">
            Total: <strong th:text="${#lists.size(books)}">0</strong> book(s)
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
