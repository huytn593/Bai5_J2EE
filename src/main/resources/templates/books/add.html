<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - BookManager'">Book Form - BookManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); max-width: 680px; margin: 0 auto; }
        .card-header {
            border-radius: 12px 12px 0 0 !important;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            color: white; font-weight: 600;
        }
        .form-label { font-weight: 500; color: #374151; }
        .form-control:focus, .form-select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 0.2rem rgba(59,130,246,0.25);
        }
        .btn-save { background: linear-gradient(135deg, #1e40af, #3b82f6); border: none; color: white; }
        .btn-save:hover { background: linear-gradient(135deg, #1e3a8a, #2563eb); color: white; }
        .required-star { color: #ef4444; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark mb-4"
     style="background: linear-gradient(135deg, #0f172a, #1e3a8a);">
    <div class="container">
        <a class="navbar-brand" href="/books">
            <i class="bi bi-book-half me-2"></i>BookManager
        </a>
        <span class="navbar-text text-light small">Spring Boot + Thymeleaf + MySQL</span>
    </div>
</nav>

<div class="container">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/books" class="text-decoration-none">
                <i class="bi bi-house-door me-1"></i>Books</a>
            </li>
            <li class="breadcrumb-item active" th:text="${pageTitle}">Form</li>
        </ol>
    </nav>

    <div class="card">
        <div class="card-header py-3">
            <h5 class="mb-0">
                <i class="bi bi-pencil-square me-2"
                   th:if="${book.id != null}"></i>
                <i class="bi bi-plus-circle me-2"
                   th:if="${book.id == null}"></i>
                <span th:text="${pageTitle}">Book Form</span>
            </h5>
        </div>
        <div class="card-body p-4">
            <form th:action="@{/books/save}" th:object="${book}" method="post">
                <!-- Hidden ID for edit mode -->
                <input type="hidden" th:field="*{id}">

                <!-- Title -->
                <div class="mb-3">
                    <label for="title" class="form-label">
                        Book Title <span class="required-star">*</span>
                    </label>
                    <input type="text" id="title" th:field="*{title}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                           placeholder="Enter book title">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}"
                         th:errors="*{title}">Title error</div>
                </div>

                <!-- Author -->
                <div class="mb-3">
                    <label for="author" class="form-label">
                        Author <span class="required-star">*</span>
                    </label>
                    <input type="text" id="author" th:field="*{author}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('author')} ? 'is-invalid'"
                           placeholder="Enter author name">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('author')}"
                         th:errors="*{author}">Author error</div>
                </div>

                <!-- Price -->
                <div class="mb-3">
                    <label for="price" class="form-label">
                        Price (VND) <span class="required-star">*</span>
                    </label>
                    <div class="input-group">
                        <input type="number" id="price" th:field="*{price}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"
                               placeholder="0" min="0" step="1000">
                        <span class="input-group-text">₫</span>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}"
                             th:errors="*{price}">Price error</div>
                    </div>
                </div>

                <!-- Category -->
                <div class="mb-4">
                    <label for="categoryId" class="form-label">
                        Category <span class="required-star">*</span>
                    </label>
                    <select id="categoryId" name="categoryId"
                            class="form-select"
                            th:classappend="${#fields.hasErrors('category')} ? 'is-invalid'">
                        <option value="" disabled
                                th:selected="${book.category == null}">-- Select a category --</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}"
                                th:selected="${book.category != null and book.category.id == cat.id}">
                        </option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('category')}"
                         th:errors="*{category}">Category error</div>
                </div>

                <!-- Buttons -->
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-save px-4">
                        <i class="bi bi-floppy-fill me-1"></i>
                        <span th:text="${book.id != null} ? 'Update Book' : 'Save Book'">Save</span>
                    </button>
                    <a href="/books" class="btn btn-outline-secondary px-4">
                        <i class="bi bi-x-circle me-1"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
